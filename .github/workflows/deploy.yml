name: Deploy to EC2

on:
  push:
    branches:
      - merge/all

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: ⬇️ Checkout repo
      uses: actions/checkout@v3

    - name: 📂 Copy files to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: 3.129.248.34
        username: student26
        key: ${{ secrets.EC2_KEY }}
        port: 22
        source: "."  # Everything
        target: "~/ICT2216-SSD-GRP26"

    - name: 🔤 Run deploy script on EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: 3.129.248.34
        username: student26
        key: ${{ secrets.EC2_KEY }}
        port: 22
        script: |
          cd ~/ICT2216-SSD-GRP26

          # Safe Git sync (works even after revert or force push)
          git fetch origin merge/all
          git reset --hard origin/merge/all
          git clean -fd  # remove untracked files

          source venv/bin/activate

          export DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
          export RECAPTCHA_PUBLIC_KEY=${{ secrets.RECAPTCHA_PUBLIC_KEY }}
          export RECAPTCHA_PRIVATE_KEY=${{ secrets.RECAPTCHA_PRIVATE_KEY }}

          export DB_NAME=${{ secrets.DB_NAME }}
          export DB_USER=${{ secrets.DB_USER }}
          export DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          export DB_HOST=${{ secrets.DB_HOST }}
          export DB_PORT=${{ secrets.DB_PORT }}

          export MONGO_URI=${{ secrets.MONGO_URI }}
          export STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
          export STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }}

          pip install -r requirements.txt
          python manage.py collectstatic --noinput
          python manage.py migrate
          sudo systemctl restart gunicorn
          sudo systemctl reload nginx
