name: Deploy to EC2

on:
  push:
    branches:
      - merge/all

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: ⬇️ Checkout repo
      uses: actions/checkout@v3

    - name: 📂 Copy files to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: 3.129.248.34
        username: student26
        key: ${{ secrets.EC2_KEY }}
        port: 22
        source: "."  # Everything
        target: "~/ICT2216-SSD-GRP26"

    - name: 🖥️ Run deploy script on EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: 3.129.248.34
        username: student26
        key: ${{ secrets.EC2_KEY }}
        port: 22
        script: |
          cd ~/ICT2216-SSD-GRP26
          git pull origin merge/all
          source venv/bin/activate
          pip install -r requirements.txt
          sudo systemctl restart gunicorn
