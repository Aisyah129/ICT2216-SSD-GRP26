{% extends 'layouts/base-fullscreen.html' %}

{% block title %} Verify Reset Code {% endblock %}

{% block content %}
<div class="container mt--8 pb-5">
  <div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">
      <div class="card bg-secondary shadow border-0">
        <div class="card-body px-lg-5 py-lg-5">
          <div class="text-center text-muted mb-4">
            <small class="custom-heading">Enter the 6-digit code sent to your email</small>
          </div>
          <form method="POST">
            {% csrf_token %}
            <div class="form-group">

              {{ form.code }}
            </div>
            <div class="text-center">
              <button type="submit" class="btn btn-primary my-4">Verify</button>
            </div>
          </form>
          {% if msg %}
          <div class="text-danger text-center">{{ msg }}</div>
          {% endif %}
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}


{% block stylesheets %}
<style>
  .custom-heading {
    font-size: 1.0rem;
    font-weight: 500;
  }
</style>
{% endblock %}
